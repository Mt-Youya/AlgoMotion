[package]
name = "algomotion-algo-wasm"
version = "0.1.0"
edition = "2021"
description = "High-performance algorithms compiled to WebAssembly for AlgoMotion"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"

[profile.release]
lto = true
opt-level = "s"
codegen-units = 1
panic = "abort"
